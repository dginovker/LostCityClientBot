<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>RS Bot Client</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #1a1a1a; display: flex; flex-direction: column; align-items: center; font-family: monospace; }
        #canvas { image-rendering: pixelated; display: block; }
        #panel {
            width: 765px;
            background: #2a2a2a;
            border: 1px solid #444;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        #toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        #toolbar select, #toolbar button {
            font-family: monospace;
            font-size: 13px;
            padding: 4px 8px;
            background: #333;
            color: #0f0;
            border: 1px solid #555;
            cursor: pointer;
        }
        #toolbar button:hover { background: #444; }
        #toolbar button.stop { color: #f44; }
        #toolbar .spacer { flex: 1; }
        #toolbar label { color: #888; font-size: 12px; }
        #editor {
            width: 100%;
            height: 120px;
            background: #1a1a1a;
            color: #0f0;
            border: 1px solid #444;
            font-family: monospace;
            font-size: 13px;
            padding: 6px;
            resize: vertical;
            tab-size: 2;
        }
        #editor:focus { outline: 1px solid #0a0; }
    </style>
</head>
<body>
    <canvas id="canvas" width="765" height="503"></canvas>
    <div id="panel">
        <div id="toolbar">
            <label>Script:</label>
            <select id="scriptSelect">
                <option value="paladin">Paladin Pickpocket</option>
                <option value="lesser_demon">Lesser Demon (Magic)</option>
                <option value="willow_chop">Willow Tree Chopping</option>
                <option value="magic_shop">Magic Shop (Buy Runes)</option>
                <option value="chicken_bones">Chickens + Bury Bones</option>
                <option value="custom">Custom</option>
            </select>
            <button id="startBtn" onclick="startScript()">Start</button>
            <button id="stopBtn" class="stop" onclick="stopScript()">Stop</button>
            <span class="spacer"></span>
            <label>User:</label>
            <input id="userInput" type="text" style="width:100px;background:#333;color:#0f0;border:1px solid #555;padding:4px;font-family:monospace;font-size:13px" placeholder="username">
            <label>Pass:</label>
            <input id="passInput" type="password" style="width:80px;background:#333;color:#0f0;border:1px solid #555;padding:4px;font-family:monospace;font-size:13px" placeholder="password">
        </div>
        <textarea id="editor" spellcheck="false"></textarea>
    </div>

    <script>
        // Pre-built scripts
        const SCRIPTS = {
            paladin: `// Pickpocket Paladins in Ardougne
bot.closeModal();
bot.pickpocketByName('paladin');`,
            lesser_demon: `// Attack Lesser Demon with Wind Bolt autocast
if (!window._ds) window._ds = 0;
if (!window._atkTicks) window._atkTicks = 0;
// Autocast setup (8 ticks with waits for server responses)
if (window._ds === 0) { bot.setTab(0); window._ds = 1; return; }
if (window._ds === 1) { bot.clickButton(353); window._ds = 2; return; }
if (window._ds === 2) { window._ds = 3; return; }
if (window._ds === 3) { bot.clickButton(1834); window._ds = 4; return; }
if (window._ds === 4) { window._ds = 5; return; }
if (window._ds === 5) { bot.selectButton(349); window._ds = 6; return; }
if (window._ds === 6) { window._ds = 7; return; }
if (window._ds < 8) { window._ds = 8; window._atkTicks = 0; return; }
// Attack demon
const demons = bot.findNpc('lesser demon');
if (demons.length > 0) {
  bot.attackNpc(demons[0].slot);
  window._atkTicks++;
  // If no damage after 5 attack ticks, walk away and redo setup
  if (window._atkTicks > 5 && demons[0].health === 0) {
    const p = bot.getPlayer();
    if (p) bot.walk(p.x + (Math.random() > 0.5 ? 1 : -1), p.z);
    window._ds = 0;
    window._atkTicks = 0;
  }
}`,
            willow_chop: `// Chop Willow Trees (logs auto-banked on this server)
bot.closeModal();
const trees = bot.findLocs('willow', 15);
if (trees.length > 0) {
  // Pick the closest tree
  const p = bot.getPlayer();
  let closest = trees[0];
  let minDist = 999;
  for (const t of trees) {
    const d = Math.abs(t.x - p.x) + Math.abs(t.z - p.z);
    if (d < minDist) { minDist = d; closest = t; }
  }
  bot.interactLoc(closest.typecode, closest.x, closest.z, 'chop');
}`,
            magic_shop: `// Buy runes from Magic Store Owner
const c = bot._client;
// Dismiss welcome screen (modal 4214) but not the shop (modal 3824)
if (c.mainModalId !== -1 && c.mainModalId !== 3824) { bot.closeModal(); return; }
// Open shop if not already open
if (c.mainModalId === -1) {
  const npc = bot.findNpc('magic store');
  if (npc.length > 0) bot.interactNpc(npc[0].slot, 'trade');
  return;
}
// Buy 10 Law Runes per tick
// Change the objId below to buy different runes (runtime IDs, +1 from obj.pack):
//   557=air, 558=earth, 559=mind, 560=body, 561=death
//   562=nature, 563=chaos, 564=law, 565=cosmic, 566=blood
const TARGET_OBJ_ID = 564; // Law rune
const items = bot.getShopItems();
const target = items.find(i => i.objId === TARGET_OBJ_ID);
if (target && target.count > 0) {
  bot.buyShopItem(target.slot, 10);
}`,
            chicken_bones: `// Kill chickens, pick up bones, bury them
bot.closeModal();
// Bone IDs: ground items use obj.pack ID (526), inventory uses +1 (527)
const BONES_GROUND = 526;
const BONES_INV = 527;
const c = bot._client;
const IfType = c.chatInterface.constructor;
const inv = IfType.list[3214];
// Priority 1: Bury any bones in inventory
for (let i = 0; i < inv.linkObjType.length; i++) {
  if (inv.linkObjType[i] === BONES_INV) {
    bot.useHeldItem(BONES_INV, i);
    return;
  }
}
// Priority 2: Pick up bones on ground
const bones = bot.getGroundItems(10).filter(g => g.objId === BONES_GROUND);
if (bones.length > 0) {
  bot.pickupGroundItem(bones[0].objId, bones[0].x, bones[0].z);
  return;
}
// Priority 3: Attack a chicken
const chickens = bot.findNpc('chicken');
if (chickens.length > 0) bot.attackNpc(chickens[0].slot);`,
            custom: `// Write your custom script here
// Available: bot.getNpcs(), bot.getPlayer(), bot.findNpc(name)
// bot.findLocs(name, radius), bot.interactLoc(typecode, x, z, 'option')
// bot.getGroundItems(radius), bot.pickupGroundItem(objId, x, z)
// bot.useHeldItem(objId, slot), bot.pickpocket(slot), bot.walk(x, z)
// bot.attackNpc(slot), bot.interactNpc(slot, 'option'), bot.clickButton(comId)
// bot.selectButton(comId), bot.setTab(tabId)
// bot.getShopItems(), bot.buyShopItem(slot, qty)
// bot.getMessages(n), bot.getStats(), bot.dismissDialog(), bot.closeModal()
`,
        };

        const editor = document.getElementById('editor');
        const select = document.getElementById('scriptSelect');

        // Load script into editor when dropdown changes
        select.addEventListener('change', () => {
            editor.value = SCRIPTS[select.value] || '';
        });
        editor.value = SCRIPTS['paladin'];

        // Handle tab key in editor
        editor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = editor.selectionStart;
                editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(editor.selectionEnd);
                editor.selectionStart = editor.selectionEnd = start + 2;
            }
        });

        function startScript() {
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;
            if (!user || !pass) {
                alert('Enter username and password');
                return;
            }

            const code = editor.value;
            const actionFn = new Function('bot', code);

            window.bot.startScript(user, pass, () => {
                actionFn(window.bot);
            });

            document.getElementById('startBtn').style.color = '#888';
            document.getElementById('stopBtn').style.color = '#f44';
        }

        function stopScript() {
            window.bot.stopScript();
            document.getElementById('startBtn').style.color = '#0f0';
            document.getElementById('stopBtn').style.color = '#888';
        }

        // Prevent canvas from stealing keyboard focus from the editor/inputs
        document.getElementById('canvas').addEventListener('mousedown', () => {
            // Only take focus if not typing in an input
            if (document.activeElement === editor ||
                document.activeElement === document.getElementById('userInput') ||
                document.activeElement === document.getElementById('passInput')) {
                // don't steal focus
            }
        });
    </script>
    <script type="module">
        import { Client } from './client.js';
        (() => {
            new Client(10, false, true);
        })();
    </script>
</body>
</html>
