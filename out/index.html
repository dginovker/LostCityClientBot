<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>RS Bot Client</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/theme/material-darker.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/hint/show-hint.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/hint/show-hint.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #1a1a1a; display: flex; flex-direction: column; align-items: center; font-family: monospace; }
        #canvas { image-rendering: pixelated; display: block; }
        #panel {
            width: 765px;
            background: #2a2a2a;
            border: 1px solid #444;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        #toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        #toolbar select, #toolbar button {
            font-family: monospace;
            font-size: 13px;
            padding: 4px 8px;
            background: #333;
            color: #0f0;
            border: 1px solid #555;
            cursor: pointer;
        }
        #toolbar button:hover { background: #444; }
        #toolbar button.stop { color: #f44; }
        #toolbar .spacer { flex: 1; }
        #toolbar label { color: #888; font-size: 12px; }
        .CodeMirror {
            width: 100%;
            height: 250px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 13px;
            border: 1px solid #444;
            border-radius: 4px;
        }
        .CodeMirror-hints { z-index: 9999; }
        #editor { display: none; }
    </style>
</head>
<body>
    <canvas id="canvas" width="765" height="503"></canvas>
    <div id="panel">
        <div id="toolbar">
            <label>Script:</label>
            <select id="scriptSelect">
                <option value="paladin">Paladin Pickpocket</option>
                <option value="lesser_demon">Lesser Demon (Magic)</option>
                <option value="willow_chop">Willow Tree Chopping</option>
                <option value="magic_shop">Shop Buyer</option>
                <option value="fletch_arrows">Fletch Arrows</option>
                <option value="chicken_bones">Chickens + Bury Bones</option>
                <option value="flax_spin">Flax Spinner</option>
                <option value="fletch_longbow">Fletch Yew Longbow</option>
                <option value="custom">Custom</option>
            </select>
            <button id="startBtn" onclick="startScript()">Start</button>
            <button id="stopBtn" class="stop" onclick="stopScript()">Stop</button>
            <span class="spacer"></span>
            <label>User:</label>
            <input id="userInput" type="text" style="width:100px;background:#333;color:#0f0;border:1px solid #555;padding:4px;font-family:monospace;font-size:13px" placeholder="username">
            <label>Pass:</label>
            <input id="passInput" type="password" style="width:80px;background:#333;color:#0f0;border:1px solid #555;padding:4px;font-family:monospace;font-size:13px" placeholder="password">
        </div>
        <textarea id="editor" spellcheck="false"></textarea>
    </div>

    <script>
        // Pre-built scripts
        const SCRIPTS = {
            paladin: `// Pickpocket Paladins in Ardougne
bot.closeModal();
bot.pickpocketByName('paladin');`,
            lesser_demon: `// Attack Lesser Demon with Wind Bolt autocast
if (!window._ds) window._ds = 0;
if (!window._atkTicks) window._atkTicks = 0;
// Autocast setup (8 ticks with waits for server responses)
if (window._ds === 0) { bot.setTab(0); window._ds = 1; return; }
if (window._ds === 1) { bot.clickButton(353); window._ds = 2; return; }
if (window._ds === 2) { window._ds = 3; return; }
if (window._ds === 3) { bot.clickButton(1834); window._ds = 4; return; }
if (window._ds === 4) { window._ds = 5; return; }
if (window._ds === 5) { bot.selectButton(349); window._ds = 6; return; }
if (window._ds === 6) { window._ds = 7; return; }
if (window._ds < 8) { window._ds = 8; window._atkTicks = 0; return; }
// Attack demon
const demons = bot.findNpc('lesser demon');
if (demons.length > 0) {
  bot.attackNpc(demons[0].slot);
  window._atkTicks++;
  // If no damage after 5 attack ticks, walk away and redo setup
  if (window._atkTicks > 5 && demons[0].health === 0) {
    const p = bot.getPlayer();
    if (p) bot.walk(p.x + (Math.random() > 0.5 ? 1 : -1), p.z);
    window._ds = 0;
    window._atkTicks = 0;
  }
}`,
            willow_chop: `// Chop Willow Trees (logs auto-banked on this server)
bot.closeModal();
const trees = bot.findLocs('willow', 15);
if (trees.length > 0) {
  // Pick the closest tree
  const p = bot.getPlayer();
  let closest = trees[0];
  let minDist = 999;
  for (const t of trees) {
    const d = Math.abs(t.x - p.x) + Math.abs(t.z - p.z);
    if (d < minDist) { minDist = d; closest = t; }
  }
  bot.interactLoc(closest.typecode, closest.x, closest.z, 'chop');
}`,
            magic_shop: `// Shop buyer - trade with nearby shop NPC and buy items
// Change NPC_NAME and TARGET_OBJ_ID to match your shop and item
// Use debug mode (bot.setDebug(true)) to see item IDs in examine text
const NPC_NAME = 'magic store';
const TARGET_OBJ_ID = 564; // Law rune (use examine to find IDs)
const c = bot._client;
if (c.mainModalId !== -1 && c.mainModalId !== 3824) { bot.closeModal(); return; }
if (c.mainModalId === -1) {
  const npc = bot.findNpc(NPC_NAME);
  if (npc.length > 0) bot.interactNpc(npc[0].slot, 'trade');
  return;
}
const items = bot.getShopItems();
const target = items.find(i => i.objId === TARGET_OBJ_ID);
if (target && target.count > 0) {
  bot.buyShopItem(target.slot, 10);
}`,
            chicken_bones: `// Kill chickens, pick up bones, bury them
bot.closeModal();
// Bone IDs: ground items use obj.pack ID (526), inventory uses +1 (527)
const BONES_GROUND = 526;
const BONES_INV = 527;
const c = bot._client;
const IfType = c.chatInterface.constructor;
const inv = IfType.list[3214];
// Priority 1: Bury any bones in inventory
for (let i = 0; i < inv.linkObjType.length; i++) {
  if (inv.linkObjType[i] === BONES_INV) {
    bot.useHeldItem(BONES_INV, i);
    return;
  }
}
// Priority 2: Pick up bones on ground
const bones = bot.getGroundItems(10).filter(g => g.objId === BONES_GROUND);
if (bones.length > 0) {
  bot.pickupGroundItem(bones[0].objId, bones[0].x, bones[0].z);
  return;
}
// Priority 3: Attack a chicken
const chickens = bot.findNpc('chicken');
if (chickens.length > 0) bot.attackNpc(chickens[0].slot);`,
            fletch_arrows: `// Fletch arrows: use feather on arrow shaft
bot.closeModal();
const FEATHER = 315;     // runtime ID
const ARROW_SHAFT = 53;  // runtime ID
const c = bot._client;
const IfType = c.chatInterface.constructor;
const inv = IfType.list[3214];
let featherSlot = -1, shaftSlot = -1;
for (let i = 0; i < inv.linkObjType.length; i++) {
  if (inv.linkObjType[i] === FEATHER && featherSlot === -1) featherSlot = i;
  if (inv.linkObjType[i] === ARROW_SHAFT && shaftSlot === -1) shaftSlot = i;
}
if (featherSlot >= 0 && shaftSlot >= 0) {
  bot.useItemOnItem(FEATHER, featherSlot, ARROW_SHAFT, shaftSlot);
}`,
            flax_spin: `// Flax Spinner: pick flax -> spin on wheel -> bank bowstring -> repeat
// Close non-bank modals (welcome screen etc)
const c0 = bot._client;
if (c0.mainModalId !== -1 && c0.mainModalId !== 5292) bot.closeModal();
const FLAX = 1780;        // runtime ID
const BOWSTRING = 1778;   // runtime ID
const FLAX_FIELD = {x:2738, z:3441};
const DOOR_POS = {x:2714, z:3475};
const LADDER_POS = {x:2712, z:3473};
const BANK_POS = {x:2724, z:3493};
if (!window._fs) window._fs = 'pick_flax';
const c = bot._client;
const IfType = c.chatInterface.constructor;
const inv = IfType.list[3214];
// Count items
let flaxSlot = -1, flaxCount = 0, itemCount = 0;
for (let i = 0; i < inv.linkObjType.length; i++) {
  if (inv.linkObjType[i] > 0) itemCount++;
  if (inv.linkObjType[i] === FLAX) { flaxCount++; if (flaxSlot === -1) flaxSlot = i; }
}
const invFull = itemCount >= 28;
const st = window._fs;
// Helper: open only CLOSED doors (locId 1530), skip open ones (1531)
function openDoorIfClosed() {
  const doors = bot.findLocs('Door', 3).filter(d => d.locId === 1530);
  if (doors.length > 0) return bot.interactLoc(doors[0].typecode, doors[0].x, doors[0].z, 'open');
  return false;
}
// State machine
if (st === 'pick_flax') {
  if (invFull && flaxCount > 0) { window._fs = 'walk_to_house'; return; }
  if (invFull && flaxCount === 0) { window._fs = 'walk_to_bank'; return; }
  if (!bot.isNear(FLAX_FIELD.x, FLAX_FIELD.z, 5)) { bot.walkTo(FLAX_FIELD.x, FLAX_FIELD.z); return; }
  const flax = bot.findLocs('Flax', 10);
  if (flax.length > 0) bot.interactLoc(flax[0].typecode, flax[0].x, flax[0].z, 'pick');
} else if (st === 'walk_to_house') {
  if (openDoorIfClosed()) return;
  if (!bot.isNear(LADDER_POS.x, LADDER_POS.z, 3)) { bot.walkTo(DOOR_POS.x, DOOR_POS.z); return; }
  window._fs = 'climb_up';
} else if (st === 'climb_up') {
  const ladder = bot.findLocs('Ladder', 5);
  if (ladder.length > 0) bot.interactLoc(ladder[0].typecode, ladder[0].x, ladder[0].z, 'climb');
  window._fs = 'spin_flax';
} else if (st === 'spin_flax') {
  if (flaxCount === 0) { window._fs = 'climb_down'; return; }
  bot.useItemOnLoc(FLAX, flaxSlot, 'Spinning wheel');
} else if (st === 'climb_down') {
  const ladder = bot.findLocs('Ladder', 10);
  if (ladder.length > 0) bot.interactLoc(ladder[0].typecode, ladder[0].x, ladder[0].z, 'climb');
  window._fs = 'walk_to_bank';
} else if (st === 'walk_to_bank') {
  if (openDoorIfClosed()) return;
  if (!bot.isNear(BANK_POS.x, BANK_POS.z, 3)) { bot.walkTo(BANK_POS.x, BANK_POS.z); return; }
  // Use closest usable booth (locId 2213) with use-quickly
  const pos2 = bot.getWorldPos();
  const banks = bot.findLocs('Bank booth', 5).filter(b => b.locId === 2213)
    .sort((a,b) => (Math.abs(a.x+c.mapBuildBaseX-pos2.x)+Math.abs(a.z+c.mapBuildBaseZ-pos2.z)) -
                   (Math.abs(b.x+c.mapBuildBaseX-pos2.x)+Math.abs(b.z+c.mapBuildBaseZ-pos2.z)));
  if (banks.length > 0) bot.interactLoc(banks[0].typecode, banks[0].x, banks[0].z, 'use-quickly');
  window._fs = 'deposit';
} else if (st === 'deposit') {
  if (c.mainModalId === -1) {
    // Bank not open - re-open closest usable booth
    const pos3 = bot.getWorldPos();
    const banks2 = bot.findLocs('Bank booth', 5).filter(b => b.locId === 2213)
      .sort((a,b) => (Math.abs(a.x+c.mapBuildBaseX-pos3.x)+Math.abs(a.z+c.mapBuildBaseZ-pos3.z)) -
                     (Math.abs(b.x+c.mapBuildBaseX-pos3.x)+Math.abs(b.z+c.mapBuildBaseZ-pos3.z)));
    if (banks2.length > 0) bot.interactLoc(banks2[0].typecode, banks2[0].x, banks2[0].z, 'use-quickly');
    return;
  }
  // Deposit ALL items via bank_side:inv (2006)
  const bankInv = IfType.list[2006];
  for (let i = 0; i < bankInv.linkObjType.length; i++) {
    if (bankInv.linkObjType[i] > 0) { bot.depositAll(bankInv.linkObjType[i], i); return; }
  }
  bot.closeModal();
  window._fs = 'walk_to_flax';
} else if (st === 'walk_to_flax') {
  if (openDoorIfClosed()) return;
  // Step out of bank first if still inside
  if (bot.isNear(BANK_POS.x, BANK_POS.z, 3)) { bot.walkTo(2722, 3488); return; }
  // If flax is nearby, start picking. Otherwise keep walking.
  if (bot.findLocs('Flax', 10).length > 0) { window._fs = 'pick_flax'; return; }
  bot.walkTo(FLAX_FIELD.x, FLAX_FIELD.z);
}`,
            fletch_longbow: `// Fletch Yew Longbows: bank -> deposit -> withdraw knife + logs -> fletch -> repeat
const KNIFE = 947;
const WILLOW_LOG = 1516;
const LONGBOW_BTN = 145;
const c = bot._client;
const IfType = c.chatInterface.constructor;
const inv = IfType.list[3214];
const bankInv = IfType.list[2006];
if (!window._wlb) window._wlb = 'open_bank';
const st = window._wlb;
// Count inventory
let knifeSlot = -1, logSlot = -1, logCount = 0, totalItems = 0;
for (let i = 0; i < inv.linkObjType.length; i++) {
  if (inv.linkObjType[i] > 0) totalItems++;
  if (inv.linkObjType[i] === KNIFE && knifeSlot === -1) knifeSlot = i;
  if (inv.linkObjType[i] === WILLOW_LOG) { logCount++; logSlot = i; }
}
// Protect the fletching interface (139) from auto-dismiss; level-ups still get dismissed
window._botProtectChatComId = (st === 'fletch') ? 139 : 0;
// Close non-bank modals (welcome screen etc)
if (c.mainModalId !== -1 && c.mainModalId !== 5292) { bot.closeModal(); return; }
if (st === 'open_bank') {
  if (c.mainModalId === 5292) { window._wlb = 'deposit'; return; }
  const pos = bot.getWorldPos();
  const banks = bot.findLocs('Bank booth', 10).filter(b => b.locId === 2213)
    .sort((a,b) => (Math.abs(a.x+c.mapBuildBaseX-pos.x)+Math.abs(a.z+c.mapBuildBaseZ-pos.z)) -
                   (Math.abs(b.x+c.mapBuildBaseX-pos.x)+Math.abs(b.z+c.mapBuildBaseZ-pos.z)));
  if (banks.length > 0) bot.interactLoc(banks[0].typecode, banks[0].x, banks[0].z, 'use-quickly');
} else if (st === 'deposit') {
  if (c.mainModalId !== 5292) { window._wlb = 'open_bank'; return; }
  for (let i = 0; i < bankInv.linkObjType.length; i++) {
    if (bankInv.linkObjType[i] > 0) { bot.depositAll(bankInv.linkObjType[i], i); return; }
  }
  window._wlb = 'withdraw_knife';
} else if (st === 'withdraw_knife') {
  if (c.mainModalId !== 5292) { window._wlb = 'open_bank'; return; }
  const bankItems = bot.getBankItems();
  const knife = bankItems.find(i => i.objId === KNIFE);
  if (knife) bot.withdrawOne(knife.objId, knife.slot);
  window._wlb = 'withdraw_logs';
} else if (st === 'withdraw_logs') {
  if (c.mainModalId !== 5292) { window._wlb = 'open_bank'; return; }
  const bankItems = bot.getBankItems();
  const logs = bankItems.find(i => i.objId === WILLOW_LOG);
  if (logs) {
    bot.withdrawAll(logs.objId, logs.slot);
    window._wlb = 'close_bank';
  } else {
    console.log('[BOT] No willow logs in bank! Stopping.');
    bot.stopScript();
  }
} else if (st === 'close_bank') {
  bot.closeModal();
  window._wlb = 'fletch';
} else if (st === 'fletch') {
  // Fletching interface showing - click longbow then immediately queue knife on next log
  if (c.chatComId === 139) {
    bot.clickButton(LONGBOW_BTN);
    if (knifeSlot >= 0 && logSlot >= 0) bot.useItemOnItem(KNIFE, knifeSlot, WILLOW_LOG, logSlot);
    return;
  }
  // Other dialog (level-up etc) - dismiss it
  if (c.chatComId !== -1) { bot.dismissDialog(); return; }
  // No more logs -> bank
  if (logCount === 0) { window._wlb = 'open_bank'; return; }
  // Use knife on log
  if (knifeSlot >= 0 && logSlot >= 0) bot.useItemOnItem(KNIFE, knifeSlot, WILLOW_LOG, logSlot);
}`,
            custom: `// Write your custom script here
// Available: bot.getNpcs(), bot.getPlayer(), bot.findNpc(name)
// bot.findLocs(name, radius), bot.interactLoc(typecode, x, z, 'option')
// bot.getGroundItems(radius), bot.pickupGroundItem(objId, x, z)
// bot.useHeldItem(objId, slot), bot.pickpocket(slot), bot.walk(x, z)
// bot.attackNpc(slot), bot.interactNpc(slot, 'option'), bot.clickButton(comId)
// bot.selectButton(comId), bot.setTab(tabId)
// bot.getShopItems(), bot.buyShopItem(slot, qty)
// bot.getMessages(n), bot.getStats(), bot.dismissDialog(), bot.closeModal()
`,
        };

        const editorEl = document.getElementById('editor');
        const select = document.getElementById('scriptSelect');

        // Build bot API completions dynamically from window.bot
        function getBotMethods() {
            if (!window.bot) return [];
            return Object.keys(window.bot).filter(k => typeof window.bot[k] === 'function')
                .map(k => {
                    const fn = window.bot[k];
                    const params = fn.toString().match(/\(([^)]*)\)/)?.[1] || '';
                    return k + '(' + params + ')';
                });
        }

        function botHint(cm) {
            const cur = cm.getCursor();
            const line = cm.getLine(cur.line);
            const end = cur.ch;
            let start = end;
            while (start > 0 && /[\w.]/.test(line.charAt(start - 1))) start--;
            const typed = line.slice(start, end);

            const methods = getBotMethods();
            const prefix = typed.startsWith('bot.') ? typed.slice(4) : typed;
            const list = methods.filter(m => m.startsWith(prefix)).map(m => ({
                text: 'bot.' + m.replace(/\(.*\)/, '('),
                displayText: 'bot.' + m,
            }));
            return { list, from: CodeMirror.Pos(cur.line, start), to: CodeMirror.Pos(cur.line, end) };
        }

        const cm = CodeMirror.fromTextArea(editorEl, {
            mode: 'javascript',
            theme: 'material-darker',
            lineNumbers: true,
            tabSize: 2,
            indentWithTabs: false,
            matchBrackets: true,
            extraKeys: {
                'Ctrl-Space': function(cm) { cm.showHint({ hint: botHint }); },
                '.': function(cm) {
                    cm.replaceSelection('.');
                    const cur = cm.getCursor();
                    const line = cm.getLine(cur.line);
                    if (line.slice(Math.max(0, cur.ch - 4), cur.ch) === 'bot.') {
                        cm.showHint({ hint: botHint, completeSingle: false });
                    }
                },
            },
        });

        // Load script into editor when dropdown changes
        select.addEventListener('change', () => {
            cm.setValue(SCRIPTS[select.value] || '');
        });
        cm.setValue(SCRIPTS['paladin']);

        // Persist username/password in localStorage
        const userInput = document.getElementById('userInput');
        const passInput = document.getElementById('passInput');
        userInput.value = localStorage.getItem('bot_user') || '';
        passInput.value = localStorage.getItem('bot_pass') || '';
        userInput.addEventListener('input', () => localStorage.setItem('bot_user', userInput.value));
        passInput.addEventListener('input', () => localStorage.setItem('bot_pass', passInput.value));

        function startScript() {
            const user = userInput.value;
            const pass = passInput.value;
            if (!user || !pass) {
                alert('Enter username and password');
                return;
            }

            const code = cm.getValue();
            const actionFn = new Function('bot', code);

            window.bot.startScript(user, pass, () => {
                actionFn(window.bot);
            });

            document.getElementById('startBtn').style.color = '#888';
            document.getElementById('stopBtn').style.color = '#f44';
        }

        function stopScript() {
            window.bot.stopScript();
            document.getElementById('startBtn').style.color = '#0f0';
            document.getElementById('stopBtn').style.color = '#888';
        }

        // Prevent canvas from stealing keyboard focus from the editor/inputs
        document.getElementById('canvas').addEventListener('mousedown', () => {
            // Only take focus if not typing in an input
            if (document.activeElement === editor ||
                document.activeElement === document.getElementById('userInput') ||
                document.activeElement === document.getElementById('passInput')) {
                // don't steal focus
            }
        });
    </script>
    <script type="module">
        const { Client } = await import('./client.js?v=' + Date.now());
        (() => {
            new Client(10, false, true);
        })();
    </script>
</body>
</html>
